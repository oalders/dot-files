---
version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      github-actions:
        patterns:
          - '*'
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    groups:
      npm:
        patterns:
          - '*'
    ignore:
      - dependency-name: acorn
        versions:
          - 8.1.1
      - dependency-name: markdownlint
        versions:
          - 0.23.0
