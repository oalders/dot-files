---
name: Dev Image

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch: # allow manual trigger

permissions:
  packages: write
  id-token: write # cosign keyless signing

env:
  IMAGE: ghcr.io/oalders/dot-files/dev-env

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker build \
            -f Dockerfile.dev \
            -t "${IMAGE}:latest" \
            --progress=plain \
            --network=host \
            --secret id=github_token,env=GITHUB_TOKEN \
            --build-arg "AGENT_UID=1000" \
            --build-arg "AGENT_GID=1000" \
            --build-context "dotfiles=." \
            .

      - name: Scan image for secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          image-ref: ${{ env.IMAGE }}:latest
          scanners: secret
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivy-config: trivy.yaml

      - name: Push
        run: docker push "${IMAGE}:latest"

      - name: Sign image
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes "${IMAGE}:latest"
